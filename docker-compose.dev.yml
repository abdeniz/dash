services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: dev
    container_name: dash-app-dev
    ports:
      - "3000:3000"
    volumes:
      - ./app/src:/app/src
      - ./app/public:/app/public
      - ./app/data:/app/data
      - ./app/drizzle:/app/drizzle
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOST=0.0.0.0
      - DB_FILE_NAME=/app/data/dash.db
    networks:
      - dash-network
    restart: unless-stopped

networks:
  dash-network:
    driver: bridge
