services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dash-server
    ports:
      - "3003:3003"
    volumes:
      - dash-data:/app/data
      - ./server/.env:/app/.env
    environment:
      - NODE_ENV=production
      - PORT=3003
      - HOST=0.0.0.0
      - DB_FILE_NAME=/app/data/dash.db
    networks:
      - dash-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      target: prod
      args:
        - VITE_API_URL=http://localhost:3003
    container_name: dash-frontend
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - dash-network
    restart: unless-stopped

networks:
  dash-network:
    driver: bridge

volumes:
  dash-data:
    driver: local
